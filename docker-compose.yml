version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cc_web
    restart: unless-stopped
    env_file:
      - apps/web/.env
    ports:
      - '3000:3000'
    networks:
      - docker_internal

  worker:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.worker
    container_name: cc_worker
    restart: unless-stopped
    env_file:
      - apps/web/.env
    networks:
      - docker_internal

networks:
  docker_internal:
    external: true
